<div
  class="cert-badge"
  [class.cert-badge-auto]="resolvedBadgeType === 'auto'"
  [class.cert-badge-uploaded]="resolvedBadgeType === 'upload'"
  [class.cert-badge-default]="resolvedBadgeType === 'default'"
  [style.--badge-size.px]="size"
  [style.--badge-accent]="accentColor"
  [style.border-color]="accentColor"
  [style.background]="resolvedBadgeType === 'default' ? accentColor + '18' : null"
>
  <ng-container *ngIf="resolvedBadgeType === 'upload'; else nonUploadBadge">
    <img [src]="uploadSrc" [alt]="altText" loading="lazy" />
  </ng-container>

  <ng-template #nonUploadBadge>
    <ng-container *ngIf="resolvedBadgeType === 'default'; else autoBadge">
      <span class="cert-default-icon">🏅</span>
      <span class="cert-default-code" [style.color]="accentColor">{{ codeText }}</span>
    </ng-container>

    <ng-template #autoBadge>
      <svg *ngIf="isIssuer('Microsoft')" viewBox="0 0 23 23" width="28" height="28">
        <rect x="1" y="1" width="10" height="10" fill="#f25022" />
        <rect x="12" y="1" width="10" height="10" fill="#7fba00" />
        <rect x="1" y="12" width="10" height="10" fill="#00a4ef" />
        <rect x="12" y="12" width="10" height="10" fill="#ffb900" />
      </svg>

      <svg *ngIf="isIssuer('AWS', 'Amazon')" viewBox="0 0 40 24" width="40" height="24">
        <path
          d="M5 18c-3-2.5-4-6-4-9.5C1 3 5.5 0 11 0c3 0 5.5 1.2 7.5 3"
          fill="none"
          stroke="#ff9900"
          stroke-width="2.2"
          stroke-linecap="round"
        />
        <path
          d="M35 18c3-2.5 4-6 4-9.5C39 3 34.5 0 29 0c-3 0-5.5 1.2-7.5 3"
          fill="none"
          stroke="#ff9900"
          stroke-width="2.2"
          stroke-linecap="round"
        />
        <path
          d="M10 14c.5.4 1.1.7 1.8.7.9 0 1.6-.4 2-.9v-3.7c-.4-.5-.9-.7-1.6-.7-1.1 0-1.8.9-1.8 2.3 0 .9.3 1.7.6 2.3h-1zm7.2.7c-2 0-3.4-1.5-3.4-3.8 0-2.2 1.4-3.8 3.4-3.8s3.4 1.5 3.4 3.8c0 2.3-1.4 3.8-3.4 3.8zm0-6.2c-1.1 0-1.8.9-1.8 2.4s.7 2.4 1.8 2.4 1.8-.9 1.8-2.4-.7-2.4-1.8-2.4zm9.2 6l-1.4-5.3-1.4 5.3h-1.6l-2.1-7.3h1.5l1.4 5.2 1.4-5.2h1.6l1.4 5.2 1.4-5.2h1.4l-2.1 7.3h-1.5z"
          fill="#ff9900"
        />
      </svg>

      <svg *ngIf="isIssuer('Google')" viewBox="0 0 24 24" width="28" height="28">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285f4"
        />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34a853"
        />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          fill="#fbbc05"
        />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#ea4335"
        />
      </svg>

      <svg *ngIf="isIssuer('CompTIA')" viewBox="0 0 60 32" width="44" height="24">
        <rect width="60" height="32" fill="#c8102e" rx="3" />
        <text
          x="30"
          y="22"
          text-anchor="middle"
          font-family="Arial Black, sans-serif"
          font-weight="900"
          font-size="14"
          fill="white"
        >
          CompTIA
        </text>
      </svg>

      <span class="cert-code-badge" *ngIf="showIssuerText" [style.color]="accentColor">
        {{ issuerLabel }}
      </span>

      <div class="cert-badge-code" [style.color]="accentColor">{{ cert.code }}</div>
    </ng-template>
  </ng-template>
</div>
